name: CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        node-version: [14.17, 16.x, 18.x]
        platform:
        - os: ubuntu-latest
          shell: bash
        - os: macos-latest
          shell: bash
        - os: windows-latest
          shell: bash
        - os: windows-latest
          shell: powershell
        exclude:
        - node-version: 14.17
          platform:
            os: macos-latest
            shell: bash
      fail-fast: false

    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v1.1.0

      - name: Use Nodejs ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        if: ${{ !startsWith(matrix.node-version, '18') }}
        run: npm test -- -c -t0

      - name: Run Tests (skip .ts on Node 18)
        if: ${{ startsWith(matrix.node-version, '18') }}
        run: npm test -- -c -t0 'test/*.js'
